# Pre-commit hooks for the SaaS Marketing Engine monorepo.
# Install: pre-commit install   ·   Run all: pre-commit run --all-files
# Hooks are local/system so they use each subproject's own tool versions.
repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff (backend)
        entry: bash -c 'cd backend && uv run ruff check .'
        language: system
        files: ^backend/.*\.py$
        pass_filenames: false

      - id: black
        name: black --check (backend)
        entry: bash -c 'cd backend && uv run black --check .'
        language: system
        files: ^backend/.*\.py$
        pass_filenames: false

      - id: eslint
        name: eslint (dashboard)
        entry: bash -c 'cd dashboard && npm run lint'
        language: system
        files: ^dashboard/.*\.(ts|tsx)$
        pass_filenames: false

      - id: tsc
        name: tsc --noEmit (dashboard)
        entry: bash -c 'cd dashboard && npm run typecheck'
        language: system
        files: ^dashboard/.*\.(ts|tsx)$
        pass_filenames: false
